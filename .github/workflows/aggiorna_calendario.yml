name: Aggiorna Calendario Inter

on:
  schedule:
    - cron: '0 8 * * 1'  # Ogni lunedì alle 08:00
  workflow_dispatch:       # Permette di avviarlo manualmente con un click

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install anthropic requests

      - name: Genera calendario aggiornato
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python genera_calendario.py

      - name: Salva il calendario aggiornato
        run: |
          git config user.name "Inter Calendar Bot"
          git config user.email "bot@inter-calendario"
          git add Inter_Milano_Calendario_2526.ics
          git diff --cached --quiet || git commit -m "🔄 Calendario aggiornato - $(date '+%d/%m/%Y')"
          git push
